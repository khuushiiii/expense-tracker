<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Expense Tracker</h1>
    </header>

    <!-- Add Expense Form -->
    <div class="card">
      <h2>Add / Edit Expense</h2>
      <form id="expense-form">
        <label>Amount (₹)</label>
        <input type="number" id="amount" placeholder="199.99">

        <label>Category</label>
        <select id="category">
          <option>Food</option>
          <option>Travel</option>
          <option>Shopping</option>
          <option>Bills</option>
        </select>

        <label>Date</label>
        <input type="date" id="date">

        <label>Note</label>
        <input type="text" id="note" placeholder="e.g. lunch with friends">

        <div class="actions">
          <button type="submit" class="btn btn-primary">Add Expense</button>
          <button type="reset" class="btn">Reset</button>
        </div>
      </form>
    </div>

    <!-- Expense Table -->
    <div class="card">
      <h2>Expenses</h2>
      <table>
        <thead>
          <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Note</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="expense-list"></tbody>
      </table>
    </div>

    <!-- Summary -->
    <div class="card">
      <h2>Summary</h2>
      <p><b>Total:</b> ₹<span id="total">0</span></p>
      <p><b>Transactions:</b> <span id="count">0</span></p>
      <p><b>Average:</b> ₹<span id="average">0</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
